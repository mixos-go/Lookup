version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: lookup_postgres
    environment:
      POSTGRES_USER: lookup
      POSTGRES_PASSWORD: lookup_dev
      POSTGRES_DB: lookup_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lookup"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: lookup_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../apps/backend
      dockerfile: Dockerfile
      target: deps
    container_name: lookup_backend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://lookup:lookup_dev@postgres:5432/lookup_db
      REDIS_URL: redis://redis:6379
    env_file:
      - ../apps/backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../apps/backend:/app
      - /app/node_modules
    command: sh -c "npx prisma generate && npm run dev"

  nginx:
    image: nginx:alpine
    container_name: lookup_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
