# docker-compose.prod.yml — VPS Deployment
# Untuk Railway: gunakan Plugin PostgreSQL + Redis bawaan Railway (lebih mudah)
# File ini hanya untuk deploy mandiri di VPS/EC2/DO Droplet

version: '3.9'

services:
  # ─── API Server ────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ../apps/backend
      dockerfile: Dockerfile
    environment:
      NODE_ENV:            production
      PORT:                3000
      DATABASE_URL:        ${DATABASE_URL}
      REDIS_URL:           redis://redis:6379
      JWT_SECRET:          ${JWT_SECRET}
      JWT_REFRESH_SECRET:  ${JWT_REFRESH_SECRET}
      ENCRYPTION_KEY:      ${ENCRYPTION_KEY}
      API_BASE_URL:        ${API_BASE_URL}
      CORS_ORIGIN:         ${CORS_ORIGIN}
      SHOPEE_PARTNER_ID:   ${SHOPEE_PARTNER_ID}
      SHOPEE_PARTNER_KEY:  ${SHOPEE_PARTNER_KEY}
      TIKTOK_APP_KEY:      ${TIKTOK_APP_KEY}
      TIKTOK_APP_SECRET:   ${TIKTOK_APP_SECRET}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── BullMQ Worker (opsional — backend sudah include worker) ──────────────────
  # Uncomment jika ingin pisahkan worker ke container sendiri di VPS
  # Catatan: Jika aktifkan ini, hapus `import './workers/bulk.worker'` di index.ts
  #
  # worker:
  #   build:
  #     context: ../apps/backend
  #     dockerfile: Dockerfile.worker
  #   environment:
  #     NODE_ENV:           production
  #     DATABASE_URL:       ${DATABASE_URL}
  #     REDIS_URL:          redis://redis:6379
  #     ENCRYPTION_KEY:     ${ENCRYPTION_KEY}
  #     SHOPEE_PARTNER_ID:  ${SHOPEE_PARTNER_ID}
  #     SHOPEE_PARTNER_KEY: ${SHOPEE_PARTNER_KEY}
  #     TIKTOK_APP_KEY:     ${TIKTOK_APP_KEY}
  #     TIKTOK_APP_SECRET:  ${TIKTOK_APP_SECRET}
  #   depends_on:
  #     - redis
  #     - postgres
  #   restart: unless-stopped

  # ─── PostgreSQL ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-lookup}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB:-lookup_prod}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lookup}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Nginx Reverse Proxy ───────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro        # mount SSL certs
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
