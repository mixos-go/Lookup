# railway.toml — Backend API Service
# Setup di Railway dashboard:
#   Service Source  : GitHub repo (branch: main)
#   Root Directory  : apps/backend
#   Config File Path: /apps/backend/railway.toml  ← absolute path

[build]
builder       = "DOCKERFILE"
dockerfilePath = "Dockerfile"        # relatif dari root directory (apps/backend)

[deploy]
startCommand         = "npx prisma migrate deploy && node dist/index.js"
healthcheckPath      = "/health"
healthcheckTimeout   = 60
restartPolicyType    = "ON_FAILURE"
restartPolicyMaxRetries = 3
